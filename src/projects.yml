    category: Garage Archaeology
    status: active
    started: "2026"
    summary: >
      Recovered objects, parts, machines, tools, and forgotten projects treated
      as artifacts. The record begins before the object is cleaned or assigned a
      final meaning.
    themes:
      - object permanence
      - documentation before action
      - finding the buried map
      - repair as memory
    documentation_style:
