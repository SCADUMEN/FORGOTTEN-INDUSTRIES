projects:
  - id: FI-PROJ-001
    slug: caselabs-mercury-s8-pedestal-restoration
    title: CaseLabs Mercury S8 + Pedestal Restoration
    working_title: Rebuilding and Archiving a CaseLabs Mercury S8 + Pedestal 2014 Time Capsule
    category: CaseLabs Archive
    status: revived
    started: "2015"
    revived: "2026"
    summary: >
      Documentation and restoration of a white powder-coated CaseLabs Mercury S8
      with pedestal, stored for roughly a decade and returned to the bench as
      part hardware archive, part recovery log, part proof of life.
    origin:
      purchased: around 2015
      stored_for: roughly a decade
      context: >
        The project paused after Matthew's father died and returned in 2026 as
        part of rebuilding life, hobbies, and identity.
    themes:
      - enthusiast hardware history
      - custom watercooling
      - inventory and identification
      - restoration
      - forum culture
      - technical nostalgia without sentimentality
    artifacts:
      - FI-CASE-001
      - FI-PED-001
      - FI-RAD-001
      - FI-RAD-002
      - FI-FAN-001
      - FI-FAN-002
      - FI-PUMP-001
      - FI-PUMP-002
      - FI-CTRL-001
      - FI-RES-001
      - FI-PSU-001
      - FI-BLOCK-MOSFET-001
      - FI-FIT-QDC-001
      - FI-CASE-PANEL-001
      - FI-CASE-FRAME-001
      - FI-CASE-TRAY-001
      - FI-CASE-PLATE-001
      - FI-CASE-FILTER-001
      - FI-PHOTO-001
    layout_goals:
      - Right-side full window
      - Visible pumps and reservoir
      - Pedestal radiator and QDC pass-throughs
      - Low RPM, excessive cooling overhead
      - Clean serial loop before experimenting with complexity
      - Functioning proof-of-concept system before any sale decision
    loop_concept:
      route:
        - Pumps in mid-right chamber
        - Top/right radiator
        - CPU/GPU components
        - Down through midplate to pedestal via QDCs
        - Pedestal radiator and service drain
        - Back up via pass-through
        - Top-left/front radiator
        - Reservoir return
      preferences:
        - Barbs and clamps over excessive angled fittings
        - EPDM tubing first for function
        - Hardline or copper possible later as aesthetic evolution
        - Serviceability matters
    proof_of_concept:
      thesis: >
        The restored Mercury S8 plus pedestal may be more valuable as a complete,
        functioning showcase system than as a collection of separate parts. The
        rare value is the chassis, restored CaseLabs hardware, Aquaero ecosystem,
        dual-D5 infrastructure, QDC-integrated pedestal loop, documentation, and
        Forgotten Industries provenance; CPU and GPU hardware can be replaced by
        a future owner.
      build_direction:
        - Use any functioning CPU/platform already available in storage
        - Use any functioning GPU or GPU set already available in storage
        - Fully assemble and fill the cooling loop
        - Verify pumps, Aquaero, sensors, QDC path, and pedestal integration
        - Run stress tests and document stable operation
      time_capsule_option:
        - X79 or X99 platform
        - GTX 780 Ti, Titan, GTX 970, or GTX 980 Ti era graphics hardware
        - EK waterblocks and period-correct loop hardware
        - Aquaero 6 XT, dual D5 pumps, and Noiseblocker eLoops
      decision_rule: >
        Complete inventory and chassis restoration before selling any
        restoration-critical component. Do not decide whether to sell the ship
        while it is still in dry dock.
    documentation_style:
      - Photograph before cleaning
      - Identify panel by panel
      - Mark unknown parts temporarily with removable labels
      - Write logs as observations, not just progress updates

