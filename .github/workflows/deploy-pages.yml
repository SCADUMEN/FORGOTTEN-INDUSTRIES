name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Build Eleventy mirror
        run: npm run build:site

      - name: Preserve GitHub Pages marker
        run: touch _site/.nojekyll

      # Pages is only enabled on the canonical org repo. Forks build as a CI
      # check but must not configure or claim the custom domain.
      - name: Configure Pages
        if: github.repository == 'Forgotten-Industries/FORGOTTEN-INDUSTRIES'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.repository == 'Forgotten-Industries/FORGOTTEN-INDUSTRIES'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    if: github.repository == 'Forgotten-Industries/FORGOTTEN-INDUSTRIES'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
